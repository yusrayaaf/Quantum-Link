<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#0a0b0f" stroke="url(#g1)" stroke-width="2"/>

  <!-- Quantum ring outer -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#g1)" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.4"/>

  <!-- Quantum ring inner -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#g2)" stroke-width="1" stroke-dasharray="4 6" opacity="0.3"/>

  <!-- Center node -->
  <circle cx="100" cy="100" r="14" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Link lines -->
  <line x1="100" y1="86" x2="100" y2="44" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="113" y1="108" x2="148" y2="130" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="87" y1="108" x2="52" y2="130" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

  <!-- Satellite nodes -->
  <circle cx="100" cy="40" r="9" fill="#1a1d26" stroke="#6366f1" stroke-width="2"/>
  <circle cx="100" cy="40" r="4" fill="#6366f1" filter="url(#glow)"/>

  <circle cx="152" cy="133" r="9" fill="#1a1d26" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="152" cy="133" r="4" fill="#22d3ee" filter="url(#glow)"/>

  <circle cx="48" cy="133" r="9" fill="#1a1d26" stroke="#818cf8" stroke-width="2"/>
  <circle cx="48" cy="133" r="4" fill="#818cf8" filter="url(#glow)"/>

  <!-- Dot accents on ring -->
  <circle cx="172" cy="75" r="3" fill="#6366f1" opacity="0.6"/>
  <circle cx="28" cy="75" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="100" cy="172" r="3" fill="#818cf8" opacity="0.6"/>
</svg>
